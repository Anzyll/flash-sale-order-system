spring.application.name=flash-sale-order-system

spring.datasource.url=jdbc:postgresql://postgres:5432/flashsale_db
spring.datasource.username=postgres
spring.datasource.password=password
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true

spring.flyway.enabled=true

spring.data.redis.host=redis
spring.data.redis.port=6379
spring.data.redis.timeout=6000

spring.security.oauth2.resourceserver.jwt.issuer-uri=http://localhost:8081/realms/flash-sale
spring.security.oauth2.resourceserver.jwt.jwk-set-uri=http://keycloak:8080/realms/flash-sale/protocol/openid-connect/certs
keycloak.server-url=http://keycloak:8080
keycloak.realm=master
keycloak.client-id=admin-cli
keycloak.username=admin
keycloak.password=admin

server.port=8000

springdoc.swagger-ui.persistAuthorization=true
springdoc.api-docs.enabled=true
springdoc.swagger-ui.enabled=true

spring.kafka.bootstrap-servers=kafka:9092

spring.kafka.consumer.group-id=order-processing-group
spring.kafka.consumer.auto-offset-reset=earliest
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.springframework.kafka.support.serializer.JsonDeserializer

spring.kafka.consumer.properties.spring.json.trusted.packages=*

spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.springframework.kafka.support.serializer.JsonSerializer