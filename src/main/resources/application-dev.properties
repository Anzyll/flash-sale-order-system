#DB
spring.datasource.url=jdbc:postgresql://localhost:5432/flashsale_db
spring.datasource.username=postgres
spring.datasource.password=password
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.flyway.enabled=true

#Redis
spring.data.redis.host=localhost
spring.data.redis.port=6379
spring.data.redis.timeout=6000

#Kafka
spring.kafka.bootstrap-servers=localhost:29092

#Keycloak
spring.security.oauth2.resourceserver.jwt.issuer-uri=http://localhost:8081/realms/flash-sale
spring.security.oauth2.resourceserver.jwt.jwk-set-uri=http://localhost:8081/realms/flash-sale/protocol/openid-connect/certs
keycloak.server-url=http://localhost:8081
keycloak.admin-realm=master
keycloak.app-realm=flash-sale
keycloak.client-id=admin-cli
keycloak.username=admin
keycloak.password=admin



